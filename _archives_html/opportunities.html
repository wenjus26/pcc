<!DOCTYPE html>
<html class="light" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Opportunités - PCC</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#33a50d",
                        "background-light": "#f6f8f6",
                        "background-dark": "#152210",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100dvh; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display flex flex-col min-h-screen">

    <header id="main-header"></header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8">
        <h1 class="text-3xl font-black mb-8">Dernières Opportunités</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Sidebar Filters -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-primary/10 shadow-sm">
                    <h3 class="font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-filter text-primary"></i> Filtrer
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <p class="text-sm font-semibold mb-2">Type de contrat</p>
                            <div class="flex flex-wrap gap-2">
                                <button class="px-4 py-2 bg-primary text-white text-xs font-bold rounded-xl">Tout</button>
                                <button class="px-4 py-2 bg-slate-100 dark:bg-slate-700 text-xs font-bold rounded-xl">CDI / CDD</button>
                                <button class="px-4 py-2 bg-slate-100 dark:bg-slate-700 text-xs font-bold rounded-xl">Stage</button>
                                <button class="px-4 py-2 bg-slate-100 dark:bg-slate-700 text-xs font-bold rounded-xl">Projet</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Opportunities List -->
            <div class="lg:col-span-2 space-y-4">
                <!-- Opportunity Card 1 -->
                <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 border border-primary/5 hover:border-primary/20 transition-all shadow-sm group">
                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="size-16 rounded-2xl bg-primary/10 flex items-center justify-center text-primary shrink-0 group-hover:scale-110 transition-transform">
                            <i class="fas fa-university text-3xl"></i>
                        </div>
                        <div class="flex-grow">
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="text-xl font-black group-hover:text-primary transition-colors">Consultant en Stratégie Digitale</h4>
                                <span class="bg-primary/10 text-primary text-[10px] font-bold px-3 py-1 rounded-full uppercase">Permanent</span>
                            </div>
                            <p class="text-slate-500 font-medium mb-4">Ministère de l'Économie Numérique • Cotonou</p>
                            <div class="flex items-center gap-4 text-xs font-bold text-slate-400">
                                <span class="flex items-center gap-1"><i class="fas fa-calendar-alt text-sm"></i> Oct 15, 2023</span>
                                <span class="flex items-center gap-1"><i class="fas fa-money-bill-wave text-sm"></i> Compétitif</span>
                            </div>
                        </div>
                        <div class="flex md:flex-col justify-end gap-2 md:items-end">
                            <button class="px-6 py-3 bg-primary text-white font-bold rounded-2xl hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all">Postuler</button>
                        </div>
                    </div>
                </div>

                <!-- Opportunity Card 2 -->
                <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 border border-primary/5 hover:border-primary/20 transition-all shadow-sm group">
                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="size-16 rounded-2xl bg-orange-100 flex items-center justify-center text-orange-600 shrink-0 group-hover:scale-110 transition-transform">
                            <i class="fas fa-leaf text-3xl"></i>
                        </div>
                        <div class="flex-grow">
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="text-xl font-black group-hover:text-primary transition-colors">Expert en Agriculture Durable</h4>
                                <span class="bg-orange-100 text-orange-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase">Projet</span>
                            </div>
                            <p class="text-slate-500 font-medium mb-4">Projet BENIN-VERT • Parakou</p>
                            <div class="flex items-center gap-4 text-xs font-bold text-slate-400">
                                <span class="flex items-center gap-1"><i class="fas fa-calendar-alt text-sm"></i> Oct 30, 2023</span>
                                <span class="flex items-center gap-1"><i class="fas fa-flag text-sm"></i> National</span>
                            </div>
                        </div>
                        <div class="flex md:flex-col justify-end gap-2 md:items-end">
                            <button class="px-6 py-3 bg-primary text-white font-bold rounded-2xl hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all">Postuler</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>
    <script src="assets/js/layout.js"></script>
</body>
</html>
