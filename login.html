<!DOCTYPE html>
<html class="light" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Connexion - PCC</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#33a50d",
                        "background-light": "#f6f8f6",
                        "background-dark": "#152210",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100dvh; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display flex flex-col min-h-screen">

    <header id="main-header"></header>

    <main class="flex-grow flex items-center justify-center p-4 sm:p-8">
        <div class="w-full max-w-md">
            <div class="mb-8">
                <a class="inline-flex items-center text-primary font-medium hover:opacity-80 transition-opacity" href="index.html">
                    <i class="fas fa-arrow-left mr-2"></i>
                    Retour à l'accueil
                </a>
            </div>
            <div class="bg-white dark:bg-background-dark/50 p-8 rounded-2xl shadow-xl border border-primary/10">
                <div class="mb-8 text-center">
                    <h1 class="text-slate-900 dark:text-slate-100 text-3xl font-black leading-tight mb-2">Bon retour !</h1>
                    <p class="text-slate-600 dark:text-slate-400 text-sm">Connectez-vous à votre espace PCC</p>
                </div>
                <form class="space-y-5">
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Email</label>
                        <input class="w-full h-12 px-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="votre@email.com" type="email"/>
                    </div>
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Mot de passe</label>
                            <a class="text-primary text-xs font-semibold hover:underline" href="#">Oublié ?</a>
                        </div>
                        <div class="relative flex items-center">
                            <input class="w-full h-12 pl-12 pr-12 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="••••••••" type="password"/>
                            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-primary">
                                <i class="fas fa-lock"></i>
                            </div>
                            <button class="absolute right-4 text-slate-400 hover:text-primary" type="button">
                                <i class="fas fa-eye text-xl"></i>
                            </button>
                        </div>
                    </div>
                    <button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20" type="submit">
                        Se connecter
                    </button>
                </form>
                
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase">
                        <span class="bg-white dark:bg-background-dark px-2 text-slate-500">Ou continuer avec</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <button class="flex items-center justify-center gap-2 h-12 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        <img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC7ltggJk2WJLfm40LLMD0EbMJ-gMDa9oX1dqU4aVu68XGrqutMe4EGUTaL7AAnT6b5MbSx2yO40uYajt6YcyAKWTIvu1yjcAJ4wGRmC5LAacNpZP3kw1x5AgD1O8Za4cq_SuHnPrJVpZviewAYK91duqNTQEjKaRLuQdFsuWuCsrjvN8RaGWycJcQfWJu57w02ILvbOX0Ap0N2CB4smiZuWv_i6xM4CscHM2ES60iHRrjfXoIFiz_XL63uCkx_T4qy8c830_XDyb8"/>
                        <span class="text-sm font-medium">Google</span>
                    </button>
                    <button class="flex items-center justify-center gap-2 h-12 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        <svg class="w-5 h-5 text-[#0077b5]" fill="currentColor" viewbox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"></path></svg>
                        <span class="text-sm font-medium">LinkedIn</span>
                    </button>
                </div>
                
                <p class="text-center text-slate-600 dark:text-slate-400 text-sm">
                    Pas encore de compte ? 
                    <a class="text-primary font-bold hover:underline" href="register.html">S'inscrire</a>
                </p>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>
    <script src="assets/js/layout.js"></script>
</body>
</html>
