{% extends "admin/base.html" %}
{% load static i18n %}

{% block title %}{{ title }} | PCC Admin Portal{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}"
        style="display: flex; align-items: center; gap: 12px; color: white; text-decoration: none;">
        <div
            style="background: white; padding: 4px; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
            <img src="{% static 'images/logo-pcc.png' %}" alt="PCC"
                style="height: 32px; width: auto; border-radius: 6px;">
        </div>
        <div style="display: flex; flex-direction: column; line-height: 1;">
            <span style="font-weight: 900; font-size: 1.2rem; letter-spacing: -0.5px;">PCC</span>
            <small
                style="font-weight: 500; opacity: 0.6; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px;">Core
                Dashboard</small>
        </div>
    </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
<style>
    :root {
        --primary: #33a50d;
        --primary-gradient: linear-gradient(135deg, #33a50d 0%, #257e0a 100%);
        --dark: #152210;
        --light-bg: #f8fafc;
        --border-color: #e2e8f0;
        --sidebar-bg: #ffffff;
    }

    body {
        font-family: 'Outfit', sans-serif !important;
        background-color: var(--light-bg) !important;
        color: #1e293b !important;
    }

    /* Header & Navigation (Top Bar) */
    #header {
        background: var(--primary) !important;
        background-image: var(--primary-gradient) !important;
        border-bottom: 2px solid rgba(255, 255, 255, 0.1) !important;
        height: 85px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        padding: 0 50px !important;
        box-shadow: 0 10px 40px rgba(51, 165, 13, 0.15) !important;
        position: sticky !important;
        top: 0 !important;
        z-index: 1000 !important;
        color: #ffffff !important;
    }

    #branding h1 a {
        color: #ffffff !important;
    }

    #branding span {
        color: #ffffff !important;
    }

    /* User Tools */
    #user-tools {
        display: flex !important;
        align-items: center !important;
        gap: 15px !important;
        background: rgba(255, 255, 255, 0.1) !important;
        padding: 8px 15px !important;
        border-radius: 40px !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        color: #ffffff !important;
    }

    #user-tools strong {
        color: #ffffff !important;
        background: rgba(255, 255, 255, 0.15) !important;
        padding: 5px 12px !important;
        border-radius: 20px !important;
        font-size: 0.8rem !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
    }

    #user-tools a {
        padding: 8px 12px !important;
        border-radius: 10px !important;
        color: #ffffff !important;
        text-decoration: none !important;
        font-size: 0.7rem !important;
        text-transform: uppercase !important;
        opacity: 0.9;
    }

    #user-tools a:hover {
        background: rgba(255, 255, 255, 0.2) !important;
        opacity: 1;
        color: #ffffff !important;
    }

    /* Breadcrumbs */
    div.breadcrumbs {
        background: rgba(255, 255, 255, 0.8) !important;
        backdrop-filter: blur(10px) !important;
        border-bottom: 1px solid var(--border-color) !important;
        padding: 15px 40px !important;
        font-weight: 600 !important;
        color: #64748b !important;
        font-size: 0.85rem !important;
        position: sticky !important;
        top: 85px !important;
        z-index: 999 !important;
    }

    /* Main Content */
    #content {
        padding: 40px !important;
        max-width: 1600px !important;
        margin: 0 auto !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }

    /* Dashboard Grid */
    .dashboard #content-main {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)) !important;
        gap: 35px !important;
        align-items: start !important;
    }

    /* Modules */
    .module {
        background: #fff !important;
        border: 1px solid var(--border-color) !important;
        border-radius: 24px !important;
        overflow: hidden !important;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03) !important;
        margin-bottom: 40px !important;
    }

    .module h2 {
        background: #fff !important;
        color: #1e293b !important;
        border-bottom: 1px solid var(--border-color) !important;
        font-weight: 800 !important;
        padding: 24px 30px !important;
    }

    /* Sidebar Styling */
    #nav-sidebar {
        background: #ffffff !important;
        border-right: 1px solid var(--border-color) !important;
        transition: transform 0.3s ease, width 0.3s ease !important;
        box-shadow: 10px 0 30px rgba(0, 0, 0, 0.02) !important;
        z-index: 900 !important;
    }

    #nav-sidebar .module th {
        background: #f8fafc !important;
        color: var(--primary) !important;
        font-weight: 800 !important;
        font-size: 0.75rem !important;
        padding: 15px 25px !important;
        text-transform: uppercase !important;
        letter-spacing: 1px !important;
    }

    #nav-sidebar th a {
        color: #1e293b !important;
        font-weight: 600 !important;
        font-size: 0.85rem !important;
        padding: 12px 25px !important;
        display: block !important;
        transition: all 0.2s ease !important;
    }

    #nav-sidebar th a:hover {
        background: rgba(51, 165, 13, 0.05) !important;
        color: var(--primary) !important;
        padding-left: 30px !important;
    }

    #nav-sidebar .current-model th a {
        color: var(--primary) !important;
        background: rgba(51, 165, 13, 0.1) !important;
        border-left: 4px solid var(--primary) !important;
    }

    /* Tables */
    table {
        width: 100% !important;
        border-collapse: separate !important;
        border-spacing: 0 !important;
    }

    th {
        background: #f8fafc !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        font-size: 0.7rem !important;
        padding: 16px 30px !important;
        border-bottom: 1px solid var(--border-color) !important;
    }

    td {
        padding: 16px 30px !important;
        font-size: 0.9rem !important;
        border-bottom: 1px solid #f1f5f9 !important;
    }

    /* Sidebar Toggle */
    #nav-sidebar {
        transition: transform 0.3s ease, width 0.3s ease !important;
    }

    .sidebar-collapsed #nav-sidebar {
        transform: translateX(-100%) !important;
        width: 0 !important;
        min-width: 0 !important;
        padding: 0 !important;
        margin: 0 !important;
        overflow: hidden !important;
    }

    .toggle-sidebar-btn {
        background: rgba(255, 255, 255, 0.1) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #fff !important;
        padding: 10px 15px !important;
        border-radius: 12px !important;
        cursor: pointer !important;
        margin-right: 20px !important;
        display: flex !important;
        align-items: center !important;
    }

    .toggle-sidebar-btn:hover {
        background: var(--primary) !important;
    }

    /* Buttons */
    .button,
    input[type=submit],
    input[type=button],
    .submit-row input,
    a.button {
        background: var(--primary-gradient) !important;
        border: none !important;
        border-radius: 14px !important;
        color: #fff !important;
        font-weight: 700 !important;
        padding: 14px 28px !important;
        box-shadow: 0 10px 20px rgba(51, 165, 13, 0.15) !important;
    }

    /* ==========================================================
       RESPONSIVE REFINEMENT (All Platforms)
       ========================================================== */

    /* Tablet & Small Laptops */
    @media (max-width: 1024px) {
        #header {
            padding: 0 30px !important;
            height: 75px !important;
        }

        #content {
            padding: 30px !important;
        }

        #user-tools {
            gap: 10px !important;
            padding: 5px 10px !important;
        }

        #user-tools a {
            font-size: 0.65rem !important;
            padding: 6px 8px !important;
        }
    }

    /* Mobile Deep Refinement (SM) */
    @media (max-width: 768px) {
        #header {
            flex-direction: column !important;
            height: auto !important;
            padding: 20px !important;
            gap: 20px !important;
        }

        #branding {
            width: 100% !important;
            justify-content: space-between !important;
        }

        #user-tools {
            width: 100% !important;
            justify-content: center !important;
            border-radius: 15px !important;
            flex-wrap: wrap !important;
        }

        /* Sidebar as Off-canvas */
        #nav-sidebar {
            position: fixed !important;
            left: -280px !important;
            top: 0 !important;
            bottom: 0 !important;
            width: 280px !important;
            z-index: 2000 !important;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.2) !important;
        }

        body.sidebar-collapsed #nav-sidebar {
            left: 0 !important;
            transform: none !important;
            width: 280px !important;
        }

        #content {
            padding: 20px !important;
        }

        /* Dashboard Grid Force 1 Column */
        .dashboard #content-main {
            grid-template-columns: 1fr !important;
            gap: 25px !important;
        }

        /* Breadcrumbs spacing */
        div.breadcrumbs {
            padding: 12px 20px !important;
            font-size: 0.75rem !important;
            top: auto !important;
            /* Let it flow */
            position: relative !important;
        }
    }

    /* Force Table scroll on small screens */
    .results,
    .module table {
        display: block !important;
        width: 100% !important;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const branding = document.getElementById('branding');
        if (branding) {
            const toggleBtn = document.createElement('button');
            toggleBtn.className = 'toggle-sidebar-btn';
            toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
            toggleBtn.onclick = function (e) {
                e.preventDefault();
                document.body.classList.toggle('sidebar-collapsed');
            };
            branding.prepend(toggleBtn);
        }
    });
</script>
{% endblock %}
