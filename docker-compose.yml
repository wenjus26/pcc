version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: pcc_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-pcc_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USER:-pcc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-db_password}
    volumes:
      - pcc_mysql_data:/var/lib/mysql
    networks:
      - pcc_vps_network

  web:
    build: .
    container_name: pcc_web
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=mysql://${DB_USER:-pcc_user}:${DB_PASSWORD:-db_password}@db:3306/${DB_NAME:-pcc_db}
    ports:
      - "127.0.0.1:8013:8013"
    depends_on:
      - db
    volumes:
      - ./static:/app/static
      - ./media:/app/media
    networks:
      - pcc_vps_network

networks:
  pcc_vps_network:
    driver: bridge

volumes:
  pcc_mysql_data:
