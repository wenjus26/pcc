version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: pcc_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-pcc_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USER:-pcc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-db_password}
    volumes:
      - pcc_mysql_data:/var/lib/mysql
    networks:
      - pcc_vps_network

  web:
    build: .
    container_name: pcc_web
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=mysql://${DB_USER:-pcc_user}:${DB_PASSWORD:-db_password}@db:3306/${DB_NAME:-pcc_db}
    depends_on:
      - db
    volumes:
      - ./static:/app/static
      - ./media:/app/media
    networks:
      - pcc_vps_network

  nginx:
    image: nginx:stable-alpine
    container_name: pcc_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/app/static:ro
      - ./media:/app/media:ro
      - ./certs:/etc/nginx/certs:ro
      - ./certbot-www:/var/www/certbot:ro
    networks:
      - pcc_vps_network

  certbot:
    image: certbot/certbot
    container_name: pcc_certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - pcc_vps_network

networks:
  pcc_vps_network:
    driver: bridge

volumes:
  pcc_mysql_data:
